name: empora
description: "Empora - Smart Fundraising Platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Fonts ──────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0

  # ── Networking ──────────────────────────────────────────────────────────────
  http: ^1.2.1
  http_parser: ^4.0.2
  dio: ^5.4.3+1

  # ── File Picking & Handling ─────────────────────────────────────────────────
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── State & Storage ─────────────────────────────────────────────────────────
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ── Auth & Token ────────────────────────────────────────────────────────────
  jwt_decoder: ^2.0.1
  local_auth: ^2.3.0

  # ── Image Handling ──────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # ── PDF Generation ──────────────────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1

  # ── URL Launcher ─────────────────────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── Payment ──────────────────────────────────────────────────────────────────
  razorpay_flutter: ^1.3.6

  # ── Utilities ───────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/empora_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0D1B2E"
  adaptive_icon_foreground: "assets/images/empora_logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/